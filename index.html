// ─── UTILITIES ────────────────────────────────────────────────────────────────
function isEventDay(){
  const n=new Date();
  return n.getUTCFullYear()===EVENT_YEAR && n.getMonth()===EVENT_MONTH && n.getDate()===EVENT_DAY;
}
function isTimeUnlocked(item){
  const n=new Date();
  if(n.getFullYear()!==EVENT_YEAR||n.getMonth()!==EVENT_MONTH||n.getDate()!==EVENT_DAY) return false;
  const t=new Date(); t.setHours(item.unlockHour,item.unlockMinute,0,0);
  return n>=t;
}
function formatUnlockTime(item){
  const h=item.unlockHour,m=item.unlockMinute;
  const p=h>=12?'PM':'AM';
  const hr=h>12?h-12:h===0?12:h;
  const mn=m===0?'':`${String(m).padStart(2,'0')}`;
  return `Unlocks at ${hr}${mn?':'+mn:''} ${p}`;
}
function getTimeLeft(item){
  const now=new Date();
  const target=new Date(EVENT_YEAR,EVENT_MONTH,EVENT_DAY,item.unlockHour,item.unlockMinute,0);
  const diff=target-now;
  if(diff<=0) return null;
  return{
    days:Math.floor(diff/86400000),
    hours:Math.floor((diff%86400000)/3600000),
    minutes:Math.floor((diff%3600000)/60000),
    seconds:Math.floor((diff%60000)/1000),
  };
}
function fmtCountdown(t){
  if(!t) return null;
  if(t.days>0) return `${t.days}d ${t.hours}h away`;
  if(t.hours>0) return `${t.hours}h ${String(t.minutes).padStart(2,'0')}m`;
  if(t.minutes>0) return `${t.minutes}m ${String(t.seconds).padStart(2,'0')}s`;
  return `${t.seconds}s`;
}
async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPassword(key,input){
  const h=await sha256(input.trim());
  return h===HASHES[key];
}

  else if(currentPage==='itinerary') root.innerHTML=renderItinerary();
  else if(currentPage==='detail') root.innerHTML=renderDetail(currentDetailId);
  attachEvents();
  startIntervals();
}

// ─── EVENT ATTACHMENT ─────────────────────────────────────────────────────────
function attachEvents(){
  // nav buttons
  document.querySelectorAll('[data-nav]').forEach(btn=>{
    btn.addEventListener('click',()=>navigate(btn.dataset.nav));
    btn.addEventListener('mouseenter',()=>btn.style.opacity='0.85');
    btn.addEventListener('mouseleave',()=>btn.style.opacity='1');
  });
  // cta buttons
  ['btn-ourday'].forEach(id=>{
    const b=document.getElementById(id);
    if(b){b.addEventListener('click',()=>navigate('ourday'));b.addEventListener('mouseenter',()=>b.style.opacity='0.85');b.addEventListener('mouseleave',()=>b.style.opacity='1');}
  });
  // detail nav
  document.querySelectorAll('[data-detail]').forEach(btn=>{
    btn.addEventListener('click',()=>navigate('detail',btn.dataset.detail));
  });
  // cards
  document.querySelectorAll('[data-card]').forEach(card=>{
    const id=card.dataset.card;
    const item=ITINERARY.find(i=>i.id===id);
    if(!item) return;
    card.addEventListener('click',()=>{
      if(isItemOpen(item)) navigate('detail',id);
      else if(item.passwordKey){activePasswordCardId=id;passwordError=false;showHint[id]=false;render();}
    });
    if(isItemOpen(item)){
      card.addEventListener('mouseenter',()=>{card.style.transform='translateY(-3px)';card.style.boxShadow='0 8px 32px rgba(0,0,0,0.12)';});
      card.addEventListener('mouseleave',()=>{card.style.transform='';card.style.boxShadow='0 2px 12px rgba(0,0,0,0.06)';});
    }
  });
  // mode modal
  document.querySelectorAll('[data-mode]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(btn.dataset.mode==='progressive'){
        unlockMode='progressive';sessionStorage.setItem('jb2026_unlock_mode','progressive');
        showModeModal=false;modeStep='choice';render();
      } else if(btn.dataset.mode==='all'&&isEventDay()){
        modeStep='confirm';render();
      }
    });
  });
  const confirmAll=document.getElementById('btn-confirm-all');
  if(confirmAll) confirmAll.addEventListener('click',()=>{
    unlockMode='all';sessionStorage.setItem('jb2026_unlock_mode','all');
    const all=allItemIds();unlockedItems=all;sessionStorage.setItem('jb2026_unlocked_items',JSON.stringify(all));
    showModeModal=false;modeStep='choice';render();
  });
  const cancelConfirm=document.getElementById('btn-cancel-confirm');
  if(cancelConfirm) cancelConfirm.addEventListener('click',()=>{modeStep='choice';render();});
  // password modal
  const pwClose=document.getElementById('pw-close');
  if(pwClose) pwClose.addEventListener('click',()=>{activePasswordCardId=null;passwordError=false;render();});
  const pwBackdrop=document.getElementById('pw-backdrop');
  if(pwBackdrop) pwBackdrop.addEventListener('click',e=>{if(e.target===pwBackdrop){activePasswordCardId=null;passwordError=false;render();}});
  const pwHint=document.getElementById('pw-hint-btn');
  if(pwHint) pwHint.addEventListener('click',()=>{showHint[activePasswordCardId]=!showHint[activePasswordCardId];render();});
  const pwSubmit=document.getElementById('pw-submit');
  const pwInput=document.getElementById('pw-input');
  if(pwInput) pwInput.focus();
  if(pwInput) pwInput.addEventListener('keydown',e=>{if(e.key==='Enter')doPasswordSubmit();});
  if(pwSubmit) pwSubmit.addEventListener('click',doPasswordSubmit);
  // map iframe
  const mapFrame=document.getElementById('map-frame');
  if(mapFrame) mapFrame.addEventListener('load',()=>{
    mapFrame.style.opacity='1';
    const skel=document.getElementById('map-skeleton');
    if(skel) skel.style.display='none';
  });
}

async function doPasswordSubmit(){
  const input=document.getElementById('pw-input');
  if(!input||!input.value.trim()||passwordChecking) return;
  passwordChecking=true;render();
  const ok=await checkPassword(activePasswordCardId,input.value);
  passwordChecking=false;
  if(ok){
    unlockedItems={...unlockedItems,[activePasswordCardId]:true};
    sessionStorage.setItem('jb2026_unlocked_items',JSON.stringify(unlockedItems));
    activePasswordCardId=null;passwordError=false;render();
  } else {
    passwordError=true;render();
  }
}

// ─── INTERVALS ────────────────────────────────────────────────────────────────
function clearAllIntervals(){
  if(countdownInterval){clearInterval(countdownInterval);countdownInterval=null;}
  Object.values(cardIntervals).forEach(clearInterval);cardIntervals={};
}
// Track open state to detect real unlocks
let prevOpenState = {};

function startIntervals(){
  if(currentPage==='landing'){
    if(!isEventDay()) countdownInterval=setInterval(updateCountdown,1000);
    setTimeout(updateCountdown,0);
  }
  if(currentPage==='itinerary'){
    // Snapshot current open state
    prevOpenState = {};
    ITINERARY.forEach(item=>{ prevOpenState[item.id]=isItemOpen(item); });

    countdownInterval=setInterval(()=>{
      // Check if any card genuinely just flipped to open
      let anyNewlyOpen=false;
      ITINERARY.forEach(item=>{
        if(item.type==='transit') return;
        const nowOpen=isItemOpen(item);
        if(nowOpen && !prevOpenState[item.id]){
          anyNewlyOpen=true;
          prevOpenState[item.id]=true;
        }
      });
      if(anyNewlyOpen){
        render();
      } else {
        updateCardCountdowns();
      }
    },1000);
  }
}
function updateCountdown(){
  const target=EVENT_TARGET_UTC;
  const diff=target-new Date();
  if(diff<=0) return;
  const days=Math.floor(diff/86400000);
  const hours=Math.floor((diff%86400000)/3600000);
  const minutes=Math.floor((diff%3600000)/60000);
  const seconds=Math.floor((diff%60000)/1000);
  const pad=n=>String(n).padStart(2,'0');
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  set('cd-days',days);set('cd-hours',pad(hours));set('cd-minutes',pad(minutes));set('cd-seconds',pad(seconds));
}
function updateCardCountdowns(){
  document.querySelectorAll('[data-card]').forEach(card=>{
    const id=card.dataset.card;
    const item=ITINERARY.find(i=>i.id===id);
    if(!item||item.type==='transit'||isItemOpen(item)) return;
    const t=getTimeLeft(item);
    const cdStr=fmtCountdown(t);
    const cdEl=card.querySelector('[data-cd]');
    if(cdEl&&cdStr) cdEl.textContent=cdStr;
  });
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
// Safety: wipe any leftover unlock state if it's not the event day
(function(){
  const n=new Date();
  const isDay=n.getFullYear()===EVENT_YEAR&&n.getMonth()===EVENT_MONTH&&n.getDate()===EVENT_DAY;
  if(!isDay){
    unlockMode=null; unlockedItems={};
    sessionStorage.removeItem('jb2026_unlock_mode');
    sessionStorage.removeItem('jb2026_unlocked_items');
  }
})();
render();
</script>
